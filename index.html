<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Mario Bros Run</title>
    <link rel="stylesheet" href="./css/style.css">
    <script src="./script.js" defer></script> 
</head>
<body>

    <div class="game-board">
        <div class="score-container">
            <div class="score-box">Score: <span id="current-score">0</span></div>
            <div class="score-box">Recorde: <span id="high-score">0</span></div>
        </div>

        <img src="./images/pipe.png" class="pipe" alt="Cano">
        <img src="./images/mario.gif" class="mario" alt="Mario">
        <img src="./images/clouds.png" class="clouds" alt="Nuvens">

        <div class="game-over-screen">
            <h1>GAME OVER</h1>
            <div class="final-score-board">
                <p>Pontuação Final: <span id="final-score">0</span></p>
                <p>Melhor Pontuação: <span id="final-high-score">0</span></p>
            </div>
            <button class="btn-restart" onclick="window.location.reload()">Jogar Novamente</button>
        </div>

        <button class="mobile-jump-btn" aria-label="Pular">PULAR</button>
    </div>

</body>
</html>
